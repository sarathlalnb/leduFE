services:
  web-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    command: sh -lc "npm ci && npm run dev -- --host 0.0.0.0 --port 5000"
    ports:
      - "5002:5000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - proxy

  web:
    build: .
    ports:
      - "5001:5000"
    networks:
      - proxy

volumes:
  node_modules:

networks:
  proxy:
    external: true
